<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | DuoPratic</title>
    <link rel="stylesheet" href="../assets/css/base.css">
</head>
<body class="fundo-login">
    <main class="acesso">
        <section class="card-acesso">
            <a class="marca marca-central" href="../index.html">
                <img class="logo" src="../assets/img/logo-duoPratic-icone.png" alt="Logo DuoPratic">
                <strong>Duo<span>Pratic</span></strong>
            </a>

            <h1>Entrar</h1>
            <p>Continue sua trilha de estudo.</p>

            <form class="formulario" data-form-acesso data-tipo-acesso="login">
                <div class="campo">
                    <label for="email">E-mail</label>
                    <input id="email" name="email" type="email" placeholder="voce@email.com" required>
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input id="senha" name="senha" type="password" placeholder="Sua senha" required>
                </div>

                <button class="botao" type="submit">Entrar</button>
            </form>

            <a class="link-acesso" href="#">Esqueci minha senha</a>
            <p class="troca-formulario">Não tem conta? <a href="cadastro.html">Criar conta</a></p>
            <a class="voltar-inicio" href="../index.html">Voltar para o início</a>
        </section>
    </main>
    <script src="../assets/js/acesso.js"></script>
</body>
</html>
